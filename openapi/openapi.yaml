        '200': { $ref: '#/components/responses/ApiResponse' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageNo:
      name: pageNo
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 200 }
    TenantId:
      name: tenantId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    BindId:
      name: bindId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    BillId:
      name: billId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    FileId:
      name: fileId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    BatchId:
      name: batchId
      in: path
      required: true
      schema: { type: integer, format: int64 }
  responses:
    ApiResponse:
      description: OK
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiResponse' }
    PageResponse:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  data: { $ref: '#/components/schemas/PageResult' }
    LoginResponse:
      description: 登录成功
      content:
        application/json:
          schema: { $ref: '#/components/schemas/LoginResponse' }
    ErrorResponse:
      description: 业务错误或权限错误
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ApiResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: integer, example: 0 }
        message: { type: string, example: success }
        data: { type: object, nullable: true }
        traceId: { type: string }
    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: integer, example: 403001 }
        message: { type: string, example: 无权限访问该资源 }
        traceId: { type: string }
        details: { type: object, nullable: true }
    PageResult:
      type: object
      properties:
        records:
          type: array
          items: { type: object }
        pageNo: { type: integer }
        pageSize: { type: integer }
        total: { type: integer, format: int64 }
    FileUploadRequest:
      type: object
      required: [projectId, moduleCode, file]
      properties:
        projectId: { type: integer, format: int64 }
        moduleCode: { type: string, example: workorder }
        sensitive: { type: boolean, default: false }
        file: { type: string, format: binary }
    FileUploadResult:
      type: object
      properties:
        fileId: { type: integer, format: int64 }
        originalName: { type: string }
        moduleCode: { type: string }
        projectId: { type: integer, format: int64 }
        contentType: { type: string }
        fileSize: { type: integer, format: int64 }
        downloadUrl: { type: string }
    FileObjectView:
      type: object
      properties:
        fileId: { type: integer, format: int64 }
        tenantId: { type: integer, format: int64 }
        projectId: { type: integer, format: int64 }
        moduleCode: { type: string }
        originalName: { type: string }
        objectKey: { type: string }
        fileExt: { type: string }
        contentType: { type: string }
        fileSize: { type: integer, format: int64 }
        sensitive: { type: boolean }
        uploaderType: { type: string, enum: [USER, MEMBER] }
        uploaderId: { type: integer, format: int64, nullable: true }
        createdAt: { type: string, format: date-time }
    CsvImportRequest:
      type: object
      required: [projectId, sourceFileId]
      properties:
        projectId: { type: integer, format: int64 }
        sourceFileId: { type: integer, format: int64 }
    ImportStatus:
      type: string
      enum: [VALIDATING, VALID_FAILED, IMPORTING, SUCCESS, PARTIAL_SUCCESS, FAILED, VOIDED]
    ImportBatchView:
      type: object
      properties:
        batchId: { type: integer, format: int64 }
        tenantId: { type: integer, format: int64 }
        projectId: { type: integer, format: int64, nullable: true }
        importType: { type: string }
        batchNo: { type: string }
        sourceFileId: { type: integer, format: int64, nullable: true }
        totalCount: { type: integer }
        successCount: { type: integer }
        failCount: { type: integer }
        importStatus: { $ref: '#/components/schemas/ImportStatus' }
        errorReportFileId: { type: integer, format: int64, nullable: true }
        canRollback: { type: boolean }
        rollbackStatus: { type: string, nullable: true }
        createdBy: { type: integer, format: int64, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
    ImportErrorDetailView:
      type: object
      properties:
        errorId: { type: integer, format: int64 }
        batchId: { type: integer, format: int64 }
        rowNo: { type: integer }
        fieldName: { type: string, nullable: true }
        rawValue: { type: string, nullable: true }
        errorCode: { type: string, nullable: true }
        errorMessage: { type: string }
        createdAt: { type: string, format: date-time }
    TenantStatus:
      type: string
      enum: [PENDING, TRIAL, ACTIVE, ARREARS_LIMITED, SUSPENDED, ARCHIVED]
    BindStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, UNBOUND, EXPIRED]
    BillStatus:
      type: string
      enum: [UNPAID, PAYING, PARTIAL_PAID, PAID, OVERDUE, VOID, REFUNDING, REFUNDED, PARTIAL_REFUNDED]
    PayOrderStatus:
      type: string
      enum: [PENDING, PAYING, PAID, CLOSED, FAILED, REFUNDING, REFUNDED, PARTIAL_REFUNDED]
    RefundStatus:
      type: string
      enum: [APPLYING, AUDIT_PASSED, AUDIT_REJECTED, REFUNDING, REFUNDED, FAILED, CLOSED]
    WorkOrderStatus:
      type: string
      enum: [SUBMITTED, ACCEPTED, DISPATCHED, PROCESSING, HANG_UP, WAIT_CONFIRM, COMPLETED, EVALUATED, CANCELLED, REJECTED, TRANSFERRED, REWORK]
    PatrolTaskStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, MISSED, EXCEPTION, RECTIFYING, RECTIFIED]
    LeaseContractStatus:
      type: string
      enum: [DRAFT, WAIT_EFFECTIVE, ACTIVE, WILL_EXPIRE, EXPIRED, TERMINATED, VOID]
    VisitorStatus:
      type: string
      enum: [PENDING, APPROVED, USED, REJECTED, EXPIRED, CANCELLED]
    FeeReportView:
      type: object
      properties:
        receivableAmount: { type: number, format: decimal }
        paidAmount: { type: number, format: decimal }
        refundAmount: { type: number, format: decimal }
        netPaidAmount: { type: number, format: decimal }
        arrearsAmount: { type: number, format: decimal }
        collectionRate: { type: number, format: decimal }
        billCount: { type: integer, format: int64 }
        unpaidBillCount: { type: integer, format: int64 }
        paidBillCount: { type: integer, format: int64 }
    WorkOrderReportView:
      type: object
      properties:
        totalCount: { type: integer, format: int64 }
        pendingCount: { type: integer, format: int64 }
        processingCount: { type: integer, format: int64 }
        overdueCount: { type: integer, format: int64 }
        completedCount: { type: integer, format: int64 }
        completionRate: { type: number, format: decimal }
        averageScore: { type: number, format: decimal }
    PatrolReportView:
      type: object
      properties:
        taskCount: { type: integer, format: int64 }
        completedCount: { type: integer, format: int64 }
        missedCount: { type: integer, format: int64 }
        exceptionCount: { type: integer, format: int64 }
        rectifiedCount: { type: integer, format: int64 }
        completionRate: { type: number, format: decimal }
        missedRate: { type: number, format: decimal }
    LeaseReportView:
      type: object
      properties:
        rentableArea: { type: number, format: decimal }
        leasedArea: { type: number, format: decimal }
        occupancyRate: { type: number, format: decimal }
        vacantResourceCount: { type: integer, format: int64 }
        activeContractCount: { type: integer, format: int64 }
        expiringContractCount: { type: integer, format: int64 }
        rentReceivableAmount: { type: number, format: decimal }
        rentPaidAmount: { type: number, format: decimal }
        customerCount: { type: integer, format: int64 }
        signedCustomerCount: { type: integer, format: int64 }
        customerConversionRate: { type: number, format: decimal }
    PlatformReportView:
      type: object
      properties:
        tenantCount: { type: integer, format: int64 }
        activeTenantCount: { type: integer, format: int64 }
        expiringTenantCount: { type: integer, format: int64 }
        projectCount: { type: integer, format: int64 }
        houseCount: { type: integer, format: int64 }
        userCount: { type: integer, format: int64 }
        memberCount: { type: integer, format: int64 }
        interfaceFailureCount: { type: integer, format: int64 }
    ReportCenterView:
      type: object
      properties:
        fee: { $ref: '#/components/schemas/FeeReportView' }
        workOrder: { $ref: '#/components/schemas/WorkOrderReportView' }
        patrol: { $ref: '#/components/schemas/PatrolReportView' }
        lease: { $ref: '#/components/schemas/LeaseReportView' }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        captchaCode: { type: string }
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                token: { type: string }
                userId: { type: integer, format: int64 }
                tenantId: { type: integer, format: int64, nullable: true }
                userType: { type: string, enum: [PLATFORM, TENANT] }
                permissions:
                  type: array
                  items: { type: string }
    TenantCreateRequest:
      type: object
      required: [tenantName, tenantCode, contactName, contactMobile, packageId]
      properties:
        tenantName: { type: string }
        tenantCode: { type: string }
        unifiedSocialCreditCode: { type: string }
        contactName: { type: string }
        contactMobile: { type: string }
        packageId: { type: integer, format: int64 }
        serviceStartDate: { type: string, format: date }
        serviceEndDate: { type: string, format: date }
    TenantUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TenantCreateRequest'
    TenantConfigRequest:
      type: object
      properties:
        logoUrl: { type: string }
        servicePhone: { type: string }
        domain: { type: string }
        wechatAppid: { type: string }
        smsChannelCode: { type: string }
        storagePolicy: { type: string }
    PackageRequest:
      type: object
      required: [packageName, packageCode, price, billingCycle]
      properties:
        packageName: { type: string }
        packageCode: { type: string }
        price: { type: number, format: decimal }
        billingCycle: { type: string, enum: [MONTH, YEAR, ONCE] }
        enabledModules:
          type: array
          items: { type: string }
    DeptRequest:
      type: object
      required: [deptName]
      properties:
        parentId: { type: integer, format: int64, nullable: true }
        deptName: { type: string }
        deptType: { type: string, enum: [TENANT, PROJECT] }
        projectId: { type: integer, format: int64, nullable: true }
        sortNo: { type: integer }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    SystemUserRequest:
      type: object
      required: [username, realName, roleIds]
      properties:
        deptId: { type: integer, format: int64, nullable: true }
        username: { type: string }
        realName: { type: string }
        mobile: { type: string }
        password: { type: string, minLength: 8 }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        roleIds:
          type: array
          items: { type: integer, format: int64 }
        projectIds:
          type: array
          items: { type: integer, format: int64 }
    SystemRoleRequest:
      type: object
      required: [roleName, roleCode]
      properties:
        roleName: { type: string }
        roleCode: { type: string }
        roleLevel: { type: string, enum: [TENANT, PROJECT] }
        dataScope: { type: string, enum: [ALL_TENANT, PROJECT, DEPT, SELF, CUSTOM] }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    RoleMenuRequest:
      type: object
      required: [menuIds]
      properties:
        menuIds:
          type: array
          items: { type: integer, format: int64 }
    UserProjectRequest:
      type: object
      required: [projectIds]
      properties:
        projectIds:
          type: array
          items: { type: integer, format: int64 }
    StatusOnlyRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ACTIVE, DISABLED] }
    StatusChangeRequest:
      type: object
      required: [status, reason]
      properties:
        status: { $ref: '#/components/schemas/TenantStatus' }
        reason: { type: string }
    ProjectRequest:
      type: object
      required: [projectCode, projectName]
      properties:
        projectCode: { type: string }
        projectName: { type: string }
        projectType: { type: string }
        province: { type: string }
        city: { type: string }
        district: { type: string }
        address: { type: string }
        managerUserId: { type: integer, format: int64 }
        servicePhone: { type: string }
        collectionSubject: { type: string }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    BuildingRequest:
      type: object
      required: [projectId, buildingName]
      properties:
        projectId: { type: integer, format: int64 }
        buildingName: { type: string }
        buildingCode: { type: string }
        buildingType: { type: string }
        floorCount: { type: integer }
        sortNo: { type: integer }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    UnitRequest:
      type: object
      required: [projectId, buildingId, unitName]
      properties:
        projectId: { type: integer, format: int64 }
        buildingId: { type: integer, format: int64 }
        unitName: { type: string }
        sortNo: { type: integer }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    HouseRequest:
      type: object
      required: [projectId, buildingId, houseNo]
      properties:
        projectId: { type: integer, format: int64 }
        buildingId: { type: integer, format: int64 }
        unitId: { type: integer, format: int64, nullable: true }
        houseNo: { type: string }
        floorNo: { type: integer }
        buildingArea: { type: number, format: decimal }
        innerArea: { type: number, format: decimal }
        houseUsage: { type: string }
        houseStatus: { type: string }
        chargeObject: { type: string }
    HouseImportRequest:
      type: object
      required: [projectId, rows]
      properties:
        projectId: { type: integer, format: int64 }
        sourceFileId: { type: integer, format: int64, nullable: true }
        rows:
          type: array
          items: { $ref: '#/components/schemas/HouseRequest' }
    WxLoginRequest:
      type: object
      required: [tenantId, openid]
      properties:
        tenantId: { type: integer, format: int64 }
        openid: { type: string }
        unionid: { type: string }
        mobile: { type: string }
        realName: { type: string }
        avatarUrl: { type: string }
    HouseBindingApplyRequest:
      type: object
      required: [tenantId, projectId, memberId, houseId, bindRole, realName, mobile]
      properties:
        tenantId: { type: integer, format: int64 }
        projectId: { type: integer, format: int64 }
        memberId: { type: integer, format: int64 }
        houseId: { type: integer, format: int64 }
        bindRole: { type: string, enum: [OWNER, FAMILY, TENANT, RESIDENT] }
        realName: { type: string }
        mobile: { type: string }
        idCardNoEncrypted: { type: string }
        proofFileIds: { type: string }
        effectiveDate: { type: string, format: date }
        expireDate: { type: string, format: date }
    UnbindRequest:
      type: object
      properties:
        reason: { type: string }
    ParkingSpaceRequest:
      type: object
      required: [projectId, spaceNo]
      properties:
        projectId: { type: integer, format: int64 }
        spaceNo: { type: string }
        spaceType: { type: string }
        status: { type: string, enum: [AVAILABLE, OCCUPIED, LOCKED, DISABLED] }
        houseId: { type: integer, format: int64, nullable: true }
    VehicleRequest:
      type: object
      required: [projectId, plateNo]
      properties:
        projectId: { type: integer, format: int64 }
        plateNo: { type: string }
        vehicleType: { type: string }
        memberId: { type: integer, format: int64, nullable: true }
        houseId: { type: integer, format: int64, nullable: true }
        spaceId: { type: integer, format: int64, nullable: true }
        monthlyRentStatus: { type: string, enum: [NONE, ACTIVE, EXPIRED, SUSPENDED] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string, enum: [ACTIVE, DISABLED] }
    MonthlyRentRequest:
      type: object
      required: [monthlyRentStatus]
      properties:
        monthlyRentStatus: { type: string, enum: [NONE, ACTIVE, EXPIRED, SUSPENDED] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
    DeviceConfigRequest:
      type: object
      required: [projectId, deviceType, vendorCode, deviceCode, deviceName]
      properties:
        projectId: { type: integer, format: int64 }
        deviceType: { type: string, enum: [ACCESS, ELEVATOR, PARKING, CAMERA] }
        vendorCode: { type: string }
        deviceCode: { type: string }
        deviceName: { type: string }
        location: { type: string }
        configJson:
          type: string
          description: 适配器配置JSON，GenericHttp适配器可配置endpointUrl
        status: { type: string, enum: [ACTIVE, DISABLED, OFFLINE] }
    VisitorInviteRequest:
      type: object
      required: [projectId, visitorName, validStartAt, validEndAt]
      properties:
        projectId: { type: integer, format: int64 }
        inviterMemberId: { type: integer, format: int64, nullable: true }
        visitorName: { type: string }
        visitorMobile: { type: string }
        visitReason: { type: string }
        validStartAt: { type: string, format: date-time }
        validEndAt: { type: string, format: date-time }
        deviceIds:
          type: array
          items: { type: integer, format: int64 }
    AccessPermissionRequest:
      type: object
      required: [projectId, deviceId, permissionType, startAt]
      properties:

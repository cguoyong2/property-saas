      summary: 批量导入房屋
      x-permission: base:house:import
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HouseImportRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/base/houses:

  /api/app/vehicles:
    get:
      tags: [App]
      summary: 我的车辆
      x-permission: app:vehicle:list
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
  /api/app/lease/contracts:
    get:
      tags: [App]
      summary: 我的租赁合同
      x-permission: app:lease:contract:list
      parameters:
        - name: projectId
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: mobile
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'

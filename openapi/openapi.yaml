openapi: 3.0.3
info:
  title: 智慧物业管理系统 SaaS 多租户版 API
  version: 1.1.1
  description: |
    本接口契约用于约束 Codex 开发。实际开发不得擅自更改路径、核心字段、状态枚举和权限标识。
    所有业务接口默认返回 ApiResponse；列表接口 data 使用 PageResult。
servers:
  - url: https://api.example.com
    description: 生产环境示例
  - url: http://localhost:8080
    description: 本地开发环境
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: PlatformTenant
  - name: System
  - name: Base
  - name: Fee
  - name: Payment
  - name: Service
  - name: File
  - name: Lease
  - name: Patrol
  - name: Device
  - name: Report
  - name: App
  - name: Import
  - name: Job
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 后台账号登录
      security: []
      x-permission: public
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/LoginResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
  /api/auth/me:
    get:
      tags: [Auth]
      summary: 当前后台用户信息
      x-permission: auth:me
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/auth/menus:
    get:
      tags: [Auth]
      summary: 获取当前用户菜单和按钮权限
      x-permission: auth:menus
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/dashboard:
    get:
      tags: [PlatformTenant]
      summary: 平台工作台
      x-permission: platform:dashboard:view
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/tenants:
    get:
      tags: [PlatformTenant]
      summary: 租户列表
      x-permission: platform:tenant:list
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
        - name: keyword
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/TenantStatus' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
    post:
      tags: [PlatformTenant]
      summary: 创建租户
      x-permission: platform:tenant:create
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantCreateRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/tenants/{tenantId}:
    get:
      tags: [PlatformTenant]
      summary: 租户详情
      x-permission: platform:tenant:view
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
    put:
      tags: [PlatformTenant]
      summary: 修改租户
      x-permission: platform:tenant:update
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantUpdateRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/tenants/{tenantId}/status:
    put:
      tags: [PlatformTenant]
      summary: 启用/停用/归档租户
      x-permission: platform:tenant:status
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusChangeRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/tenants/{tenantId}/config:
    get:
      tags: [PlatformTenant]
      summary: 租户配置详情
      x-permission: platform:tenant:config:view
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
    put:
      tags: [PlatformTenant]
      summary: 修改租户配置
      x-permission: platform:tenant:config:update
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantConfigRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/packages:
    get:
      tags: [PlatformTenant]
      summary: 套餐列表
      x-permission: platform:package:list
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
    post:
      tags: [PlatformTenant]
      summary: 创建套餐
      x-permission: platform:package:create
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PackageRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/usage:
    get:
      tags: [PlatformTenant]
      summary: 租户用量统计
      x-permission: platform:usage:view
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
  /api/platform/notices:
    get:
      tags: [PlatformTenant]
      summary: 平台公告列表
      x-permission: platform:notice:list
      parameters:
        - name: tenantId
          in: query
          schema: { type: integer, format: int64 }
        - name: projectId
          in: query
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          schema: { type: string, enum: [DRAFT, PUBLISHED, WITHDRAWN] }
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
    post:
      tags: [PlatformTenant]
      summary: 发布平台公告
      x-permission: platform:notice:create
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlatformNoticeCreateRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/platform/monitor:
    get:
      tags: [PlatformTenant]
      summary: 运维监控
      x-permission: platform:monitor:view
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/users:
    get:
      tags: [System]
      summary: 后台用户列表
      x-permission: system:user:list
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
    post:
      tags: [System]
      summary: 新增后台用户
      x-permission: system:user:create
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/users/{userId}:
    put:
      tags: [System]
      summary: 修改后台用户
      x-permission: system:user:update
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemUserRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/users/{userId}/status:
    put:
      tags: [System]
      summary: 启停后台用户
      x-permission: system:user:status
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusOnlyRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/users/{userId}/projects:
    put:
      tags: [System]
      summary: 设置用户授权项目
      x-permission: system:user:project
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProjectRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/roles:
    get:
      tags: [System]
      summary: 角色列表
      x-permission: system:role:list
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
    post:
      tags: [System]
      summary: 新增角色
      x-permission: system:role:create
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/roles/{roleId}:
    put:
      tags: [System]
      summary: 修改角色
      x-permission: system:role:update
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemRoleRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/system/roles/{roleId}/menus:
    get:
      tags: [System]
      summary: 角色已授权菜单权限
      x-permission: system:role:menu:view
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
    put:
      tags: [System]
      summary: 设置角色菜单权限
      x-permission: system:role:menu:update
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:

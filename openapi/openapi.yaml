  /api/app/notices:
    get:
      tags: [App]
      summary: 小程序公告列表
      x-permission: app:notice:list
      parameters:
        - name: projectId
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: memberId
          in: query
          schema: { type: integer, format: int64 }
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
  /api/app/visitors:
    post:
      tags: [App]
      summary: 小程序创建访客邀请
      x-permission: app:visitor:create
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VisitorInviteRequest' }

    post:
      tags: [Base]
      summary: 新增项目/小区
      x-permission: base:project:create
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/base/projects/{projectId}:
    get:
      tags: [Base]
      summary: 项目/小区详情
      x-permission: base:project:view
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
    put:
      tags: [Base]
      summary: 修改项目/小区
      x-permission: base:project:update
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/base/buildings:
    get:
      tags: [Base]
      summary: 楼栋列表
      x-permission: base:building:list
      responses:
        '200': { $ref: '#/components/responses/PageResponse' }
    post:
      tags: [Base]

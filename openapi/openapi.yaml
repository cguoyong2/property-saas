        - name: projectId
          in: query
          schema: { type: integer, format: int64 }
        - name: memberId
          in: query
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/BindStatus' }
      responses:

      x-permission: base:building:create
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BuildingRequest' }
      responses:
        '200': { $ref: '#/components/responses/ApiResponse' }
  /api/base/buildings/{buildingId}:
    get:
      tags: [Base]
      summary: 楼栋详情

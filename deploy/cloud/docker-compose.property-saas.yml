name: property-saas

services:
  mysql:
    image: mysql:8.0
    container_name: property-saas-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-property_saas}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - property_saas_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - property-saas-net

  redis:
    image: redis:7
    container_name: property-saas-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - property-saas-net

  backend:
    image: eclipse-temurin:17-jre
    container_name: property-saas-backend
    restart: unless-stopped
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-property-saas-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      PROPERTY_SAAS_JWT_SECRET: ${PROPERTY_SAAS_JWT_SECRET:?PROPERTY_SAAS_JWT_SECRET is required}
      PROPERTY_SAAS_JWT_TTL_SECONDS: ${PROPERTY_SAAS_JWT_TTL_SECONDS:-7200}
      PROPERTY_SAAS_FILE_LOCAL_ROOT_DIR: /data/property-saas/uploads
      PROPERTY_SAAS_FILE_MAX_SIZE_BYTES: ${PROPERTY_SAAS_FILE_MAX_SIZE_BYTES:-10485760}
      PROPERTY_SAAS_JOB_ENABLED: ${PROPERTY_SAAS_JOB_ENABLED:-false}
      WECHAT_PAY_MODE: ${WECHAT_PAY_MODE:-DEV_SIMULATED}
      WECHAT_PAY_CALLBACK_TOLERANCE_SECONDS: ${WECHAT_PAY_CALLBACK_TOLERANCE_SECONDS:-300}
      WECHAT_PAY_MERCHANT_PRIVATE_KEY_PATH: ${WECHAT_PAY_MERCHANT_PRIVATE_KEY_PATH:-}
      WECHAT_PAY_MERCHANT_CERTIFICATE_PATH: ${WECHAT_PAY_MERCHANT_CERTIFICATE_PATH:-}
      WECHAT_PAY_PLATFORM_CERTIFICATE_PATH: ${WECHAT_PAY_PLATFORM_CERTIFICATE_PATH:-}
      WECHAT_PAY_API_V3_KEY_REF: ${WECHAT_PAY_API_V3_KEY_REF:-}
    volumes:
      - ./backend/backend.jar:/app/backend.jar:ro
      - property_saas_uploads:/data/property-saas/uploads
    command: ["java", "-jar", "/app/backend.jar"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - property-saas-net

  admin-web:
    image: nginx:1.27-alpine
    container_name: property-saas-admin-web
    restart: unless-stopped
    volumes:
      - ./admin-web/dist:/usr/share/nginx/html:ro
      - ./nginx/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - property-saas-net

  mobile-h5:
    image: nginx:1.27-alpine
    container_name: property-saas-mobile-h5
    restart: unless-stopped
    volumes:
      - ./mobile-h5/dist:/usr/share/nginx/html:ro
      - ./nginx/mobile-h5.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - property-saas-net

volumes:
  property_saas_mysql_data:
  property_saas_uploads:

networks:
  property-saas-net:
    name: property-saas-net
    driver: bridge

upstream property_saas_backend {
    server property-saas-backend:8080;
}

upstream property_saas_admin_web {
    server property-saas-admin-web:80;
}

upstream property_saas_mobile_h5 {
    server property-saas-mobile-h5:80;
}

server {
    listen 80;
    server_name property.yqej.cn property-h5.yqej.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name property.yqej.cn;

    ssl_certificate /etc/letsencrypt/live/property.yqej.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/property.yqej.cn/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://property_saas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location /actuator/ {
        proxy_pass http://property_saas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://property_saas_admin_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}


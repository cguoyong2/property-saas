services:
  mysql:
    image: mysql:8.0
    container_name: property-saas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-property_saas}
      MYSQL_USER: ${MYSQL_USER:-property}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-property}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema_mysql8.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/seed_demo_data.sql:/docker-entrypoint-initdb.d/02-seed-demo.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    container_name: property-saas-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio
    container_name: property-saas-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
volumes:
  mysql_data:
  minio_data:
